<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embed harness — how it looks inside Google Sites</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #dfe6ec; color: #15222e; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 22px 16px 50px; }
    h1 { font-size: 1.2rem; }
    p { color: #4a5a68; }
    .frame { background:#fff; border:1px solid #b9c6d2; border-radius:10px; overflow:hidden; box-shadow:0 12px 30px rgba(0,36,84,.14); }
    iframe { width: 100%; height: 720px; border: 0; display: block; }
    code { background:#fff; border:1px solid #cdd8e2; border-radius:5px; padding:2px 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Embed preview (simulating a Google Sites embed)</h1>
    <p>This frames <code>embed.html</code> at a typical embed height (720&nbsp;px). In Google Sites,
       Insert → Embed → By URL using the hosted <code>embed.html</code>, then drag to resize.</p>
    <div class="frame">
      <iframe src="embed.html" title="AZ GenAI Guidance companion"></iframe>
    </div>
  </div>
</body>
</html>
